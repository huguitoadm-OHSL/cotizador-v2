<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cotizador Pro | Grupo Paz</title>
    
    <!-- Configuración del Logo -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Motor de Diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Colores para la barra del celular -->
    <meta name="theme-color" content="#0B1121" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cotizador" />
  </head>
  <body class="bg-[#0B1121]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- 🔥 ACTIVADOR MODO OFFLINE (Service Worker) 🔥 -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(registration) {
            console.log('Modo Offline activado con éxito:', registration.scope);
          }, function(err) {
            console.log('Fallo al activar el Modo Offline:', err);
          });
        });
      }
    </script>
  </body>
</html>
